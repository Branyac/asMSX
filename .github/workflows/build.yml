name: Build

on:
  workflow_dispatch: {}
  release:
    types: [released]
  push:
    branches: [ master ]
    paths-ignore:
      - 'doc/**'
      - 'ref/**'
      - '*.md'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - 'doc/**'
      - 'ref/**'
      - '*.md'

jobs:
  windows:
    name: windows ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: i686
            bits: "32"
          - target: x86-64
            bits: "64"
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: install deps
      run: |
        sudo apt update
        sudo apt install -y libbison-dev libfl-dev build-essential cmake flex bison libpthread-stubs0-dev
        sudo apt install -y gcc-mingw-w64-${{ matrix.target }} g++-mingw-w64-${{ matrix.target }}
    - name: make
      run: make asmsx${{ matrix.bits }}.exe
    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: asmsx-win-${{ matrix.target }}
        path: asmsx*.exe

  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: install deps
      run: |
        sudo apt update
        sudo apt install -y libbison-dev libfl-dev build-essential cmake flex bison libpthread-stubs0-dev
    - run: make
    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: asmsx-linux-x86_64
        path: asmsx

  linux-armhf:
    needs: linux
    runs-on: ubuntu-latest
    env:
      GCC_VERSION: "10.2-2020.11"
      BUILD_TARGET: arm-none-linux-gnueabihf
      GCC_NAME: "gcc-arm-10.2-2020.11-x86_64-arm-none-linux-gnueabihf"
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: install deps
      run: |
        sudo apt update
        sudo apt install -y libbison-dev libfl-dev build-essential cmake flex bison libpthread-stubs0-dev
        wget https://developer.arm.com/-/media/Files/downloads/gnu-a/${{ env.GCC_VERSION }}/binrel/${{ env.GCC_NAME }}.tar.xz
        tar xvf ${{ env.GCC_NAME }}.tar.xz
    - name: make
      run: make CC=${{ env.GCC_NAME }}/bin/${{ env.BUILD_TARGET }}-gcc LDFLAGS="-static"
    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: asmsx-linux-armhf
        path: asmsx

  deb:
    name: Create .deb packages
    needs: [linux, linux-armhf]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Download linux artifacts
      uses: actions/download-artifact@v4
      with:
        name: asmsx-linux-x86_64
        path: linux64
    - name: Download armhf artifact
      uses: actions/download-artifact@v4
      with:
        name: asmsx-linux-armhf
        path: armhf
    - name: Install packaging tools
      run: |
        sudo apt update
        sudo apt install -y dpkg-dev fakeroot gettext-base
    - name: Build amd64 .deb
      run: |
        mkdir -p pkg_amd64/DEBIAN pkg_amd64/usr/bin
        cp linux64/asmsx pkg_amd64/usr/bin/asmsx
        chmod 755 pkg_amd64/usr/bin/asmsx
        VERSION=${{ github.run_number }}-1
        ARCH=amd64
        envsubst < packaging/deb/control.template > pkg_amd64/DEBIAN/control
        dpkg-deb --build pkg_amd64 asmsx_${{ github.run_number }}_amd64.deb
    - name: Build armhf .deb
      run: |
        mkdir -p pkg_armhf/DEBIAN pkg_armhf/usr/bin
        cp armhf/asmsx pkg_armhf/usr/bin/asmsx
        chmod 755 pkg_armhf/usr/bin/asmsx
        VERSION=${{ github.run_number }}-1
        ARCH=armhf
        envsubst < packaging/deb/control.template > pkg_armhf/DEBIAN/control
        dpkg-deb --build pkg_armhf asmsx_${{ github.run_number }}_armhf.deb
    - name: Upload .deb artifacts
      uses: actions/upload-artifact@v4
      with:
        name: asmsx-deb-amd64
        path: asmsx_${{ github.run_number }}_amd64.deb
    - name: Upload .deb artifacts (armhf)
      uses: actions/upload-artifact@v4
      with:
        name: asmsx-deb-armhf
        path: asmsx_${{ github.run_number }}_armhf.deb

  osx:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: install deps
      run: brew install flex bison
    - name: make
      run: make
    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: asmsx-darwin
        path: asmsx

  test:
    runs-on: ubuntu-latest
    needs: linux
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        name: asmsx-linux-x86_64
    - name: Install Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies and fix permissions
      run: |
        sudo apt update
        sudo apt install -y dos2unix
        pip3 install --upgrade pip behave
        chmod a+x asmsx
    - run: make test

  release:
    name: Upload to Release
    runs-on: ubuntu-latest
    needs: [windows, linux, linux-armhf, osx, deb]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: assets
    - name: Rename artifacts
      working-directory: assets
      run: |
        for FOLDER in *; do
          cd $FOLDER
          chmod a+x *
          if [[ "$FOLDER" == *"-win"* ]]; then
            mv * $(basename $PWD).exe
          elif [[ "$FOLDER" == *"-deb-"* ]]; then
            mv * $(basename $PWD).deb
          else
            mv * $(basename $PWD)
          fi
          cd ..
        done
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: 'assets/asmsx-*/*'

