name: Build

on:
  workflow_dispatch: {}
  release:
    types: [released]
  push:
    branches: [ master ]
    paths-ignore:
      - 'doc/**'
      - 'ref/**'
      - '*.md'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - 'doc/**'
      - 'ref/**'
      - '*.md'

jobs:
  windows:
    name: windows ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: i686
            bits: "32"
          - target: x86-64
            bits: "64"
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - name: install deps
      run: |
        sudo apt update
        sudo apt install -y libbison-dev libfl-dev build-essential cmake flex bison libpthread-stubs0-dev
        sudo apt install -y gcc-mingw-w64-${{ matrix.target }} g++-mingw-w64-${{ matrix.target }}
    - name: make
      run: make asmsx${{ matrix.bits }}.exe
    - name: upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: asmsx-win-${{ matrix.target }}
        path: asmsx*.exe

  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - name: install deps
      run: |
        sudo apt update
        sudo apt install -y libbison-dev libfl-dev build-essential cmake flex bison libpthread-stubs0-dev
    - run: make
    - name: upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: asmsx-linux-x86_64
        path: asmsx

  linux-armhf:
    needs: linux
    runs-on: ubuntu-latest
    env:
      GCC_VERSION: "10.2-2020.11"
      BUILD_TARGET: arm-none-linux-gnueabihf
      GCC_NAME: "gcc-arm-10.2-2020.11-x86_64-arm-none-linux-gnueabihf"
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - name: install deps
      run: |
        sudo apt update
        sudo apt install -y libbison-dev libfl-dev build-essential cmake flex bison libpthread-stubs0-dev
        wget https://developer.arm.com/-/media/Files/downloads/gnu-a/${{ env.GCC_VERSION }}/binrel/${{ env.GCC_NAME }}.tar.xz
        tar xvf ${{ env.GCC_NAME }}.tar.xz
    - name: make
      run: make CC=${{ env.GCC_NAME }}/bin/${{ env.BUILD_TARGET }}-gcc LDFLAGS="-static"
    - name: upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: asmsx-linux-armhf
        path: asmsx

  deb:
    name: Create package asmsx-linux-${{ matrix.arch }}.deb
    needs: [linux, linux-armhf]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
          - arch: armhf
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - name: Install packaging tools
      run: |
        sudo apt update
        sudo apt install -y dpkg-dev fakeroot gettext-base
    - name: Download artifacts
      uses: actions/download-artifact@v8
      with:
        path: bin
    - name: Build .deb
      run: |
        set -euo pipefail  # Exit on error, undefined vars, pipe failures

        RUN_NUMBER=${{ github.run_number }}
        ARCH=${{ matrix.arch }}
        VERSION=$(git describe --tags --always 2>/dev/null) || VERSION="${{ github.run_number }}"

        echo "Create package for $ARCH"
        mkdir -p pkg_$ARCH/usr/bin/
        if [[ $ARCH == "amd64" ]]; then
          cp ./bin/asmsx-linux-x86_64/asmsx pkg_$ARCH/usr/bin/asmsx
        else
          cp ./bin/asmsx-linux-$ARCH/asmsx pkg_$ARCH/usr/bin/asmsx
        fi

        mkdir -p pkg_$ARCH/DEBIAN pkg_$ARCH/usr/bin
        chmod 755 pkg_$ARCH/usr/bin/asmsx

        export ARCH VERSION
        envsubst < packaging/deb/control.template > pkg_$ARCH/DEBIAN/control

        dpkg-deb --build pkg_$ARCH asmsx_${VERSION}_${ARCH}.deb
    - name: Upload .deb artifacts
      uses: actions/upload-artifact@v7
      with:
        name: asmsx-linux-${{ matrix.arch }}.deb
        path: asmsx_*.deb

  osx:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - name: install deps
      run: |
        export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
        brew install flex bison
    - name: make
      run: make
    - name: upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: asmsx-darwin
        path: asmsx

  test:
    runs-on: ubuntu-latest
    needs: linux
    steps:
    - uses: actions/checkout@v7
    - uses: actions/download-artifact@v8
      with:
        name: asmsx-linux-x86_64
    - name: Install Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    - name: Install dependencies and fix permissions
      run: |
        sudo apt update
        sudo apt install -y dos2unix
        pip3 install --upgrade pip behave
        chmod a+x asmsx
    - run: make test

  release:
    name: Upload to Release
    runs-on: ubuntu-latest
    needs: [windows, linux, linux-armhf, osx, deb]
    #if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v8
      with:
        path: assets
    - name: Rename artifacts
      working-directory: assets
      run: |
        for FOLDER in *; do
          cd $FOLDER
          chmod a+x *
          if [[ "$FOLDER" == *"-win"* ]]; then
            mv * $(basename $PWD).exe
          elif [[ "$FOLDER" == *"-deb-"* ]]; then
            mv * $(basename $PWD).deb
          else
            mv * $(basename $PWD)
          fi
          cd ..
        done
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: 'assets/asmsx-*/*'

